name: Terragrunt Deploy

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Futuro-proof para Node.js 24
  TG_NON_INTERACTIVE: true # Nova variável recomendada

permissions:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  id-token: write
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64"
          sudo chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          aws-region: us-east-1

      - name: Terragrunt Plan
        id: plan
        run: |
          set -o pipefail
          terragrunt run --all --backend-bootstrap plan --no-color | tee plan_output.txt
        working-directory: environments/dev

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs');
            let output = "Plan failed or output not found";
            try { output = fs.readFileSync('environments/dev/plan_output.txt', 'utf8'); } catch(e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '#### Terragrunt Plan Output 📖\n<details><summary>Show Plan</summary>\n\n```terraform\n' + output + '\n```\n\n</details>\n\n**Aprove o deploy no Environment "aws-deploy" para prosseguir.**'
            })

  apply:
    name: Terragrunt Apply
    needs: plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: aws-deploy
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64"
          sudo chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          aws-region: us-east-1

      - name: Terragrunt Apply
        run: |
          terragrunt run --all --backend-bootstrap apply
        working-directory: environments/dev

      - name: Auto-Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge
