name: Terragrunt Deploy

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write # Necessário para o auto-merge
  pull-requests: write # Necessário para comentar e mergear

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          aws-region: us-east-1

      - name: Setup Terragrunt
        uses: mscoutermarsh/terragrunt-action@v0.0.2
        with:
          terragrunt_version: latest

      - name: Terragrunt Plan
        id: plan
        run: |
          set -o pipefail
          terragrunt run-all plan --terragrunt-non-interactive -no-color | tee plan_output.txt
        working-directory: environments/dev

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs');
            let output = "Plan failed or output not found";
            try { output = fs.readFileSync('environments/dev/plan_output.txt', 'utf8'); } catch(e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '#### Terragrunt Plan Output 📖\n<details><summary>Show Plan</summary>\n\n```terraform\n' + output + '\n```\n\n</details>\n\n**Aprove o deploy no Environment "aws-deploy" para prosseguir.**'
            })

  apply:
    name: Terragrunt Apply
    needs: plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: aws-deploy # Aqui acontece a mágica da aprovação manual
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          aws-region: us-east-1

      - name: Setup Terragrunt
        uses: mscoutermarsh/terragrunt-action@v0.0.2
        with:
          terragrunt_version: latest

      - name: Terragrunt Apply
        run: |
          terragrunt run-all apply --terragrunt-non-interactive
        working-directory: environments/dev

      - name: Auto-Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge
