name: Terragrunt Destroy (Cost Cleanup)

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "DESTROY" to confirm deletion'
        required: true
        default: 'CANCEL'

jobs:
  destroy:
    name: Infrastructure Teardown
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'DESTROY'
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64"
          sudo chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          aws-region: us-east-1

      - name: Terragrunt Destroy
        run: |
          TERRAGRUNT_NON_INTERACTIVE=true terragrunt run-all destroy
        working-directory: environments/dev
